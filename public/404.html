<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Mr. Bones Stump Grinding</title>
    <script>
      // SPA redirect for GitHub Pages and custom domains
      // Keeps the repo segment only on the github.io URL
      var pathSegmentsToKeep = window.location.hostname === 'rcharp.github.io' ? 1 : 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
